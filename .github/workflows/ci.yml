name: CI

on:
  workflow_dispatch:
  schedule:
    # Daily 06:00 UTC on default branch (catches upstream Go/module drift when there are no commits).
    - cron: "0 6 * * *"
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read
  packages: write
  actions: write

jobs:
  BuildAndTest:
    name: Build and Test
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Set Up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.25"

      - name: Ensure dependencies
        run: go mod tidy

      - name: Vet
        run: go vet ./...

      - name: Build
        run: go build ./...

      - name: Run Tests
        run: go test ./... -v -cover
